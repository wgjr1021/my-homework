<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人作业展示</title>
  <link rel="stylesheet" href="./css/my-homework.css">
</head>
<body>

<div class="container">
  <header>
    <h1>个人作业展示</h1>
    <p>课程作业 / 文档 / PPT / 视频 汇总</p>
  </header>

  <!-- 作业分类：Word 文档 -->
  <section class="work-category">
    <h2>📄 Word 文档</h2>
    <div class="card-list">

      <!-- 一份作业（你可以复制这个 .card 新增作业） -->
      <div class="card">
        <div class="date">2026-5-31</div>
        <h3>作业标题 1</h3>
        <p>作业简单描述（可选）</p>
        <a href="./food-safety-report-对含糖饮料的食品安全风险认知分析" class="btn">打开查看</a>
      </div>

      <div class="card">
        <div class="date">2025-12-15</div>
        <h3>作业标题 2</h3>
        <p>作业简单描述（可选）</p>
        <a href="#" class="btn">打开查看</a>
      </div>

    </div>
  </section>

  <!-- 作业分类：PPT -->
  <section class="work-category">
    <h2>📊 PPT 演示文稿</h2>
    <div class="card-list">

      <div class="card">
        <div class="date">2025-12-18</div>
        <h3>PPT 作业 1</h3>
        <p>课程汇报 / 总结</p>
        <a href="#" class="btn">打开查看</a>
      </div>

    </div>
  </section>

  <!-- 作业分类：视频 -->
  <section class="work-category">
    <h2>🎥 视频作业</h2>
    <div class="card-list">

      <div class="card">
        <div class="date">2025-12-10</div>
        <h3>视频作业 1</h3>
        <p>拍摄 / 剪辑 / 展示</p>
        <a href="#" class="btn">播放视频</a>
      </div>

    </div>
  </section>

</div>

</body>
</html>
